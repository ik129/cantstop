<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャントストップ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>キャントストップ</h1>
        </header>

        <div id="room-management">
            <h2>部屋管理</h2>
            <div>
                <label for="player-name">プレイヤー名:</label>
                <input type="text" id="player-name" name="player-name">
            </div>
            <div>
                <button id="create-room">部屋を作成</button>
            </div>
            <div>
                <label for="room-id">部屋ID:</label>
                <input type="text" id="room-id" name="room-id">
                <button id="join-room">部屋に入る</button>
            </div>
            <div>
                <button id="start-game" disabled>ゲームを開始</button>
            </div>
        </div>

        <main id="game-area" style="display: none;">
            <div id="player-info">
                <h3>プレイヤー情報</h3>
                <div id="current-player">現在のプレイヤー: <span></span></div>
                <div id="players-list">
                    <!-- プレイヤーごとの情報がここに表示される -->
                </div>
            </div>

            <div id="game-board">
                <!-- トラックとマスがここに動的に生成される -->
            </div>

            <div id="dice-area">
                <h3>ダイス</h3>
                <div id="dice-results">
                    <!-- ダイスの結果がここに表示される -->
                </div>
                <button id="roll-dice" disabled>ダイスを振る</button>
            </div>

            <div id="dice-combination-area" style="display: none;">
                <h4>ダイスの組み合わせを選択</h4>
                <div id="dice-combinations">
                    <!-- ダイスの組み合わせの選択肢がここに表示される -->
                </div>
            </div>

            <div id="controls">
                <h3>操作</h3>
                <button id="stop-turn" disabled>ストップ</button>
                <button id="continue-turn" disabled>続ける</button>
            </div>
        </main>
    </div>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
