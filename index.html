<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャントストップ オンライン</title>
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>キャントストップ</h1>
    </header>

    <div class="container">
        <!-- Room Management Section: Create or Join a game room -->
        <div id="room-management">
            <h2>部屋管理</h2>
            <div>
                <h3>部屋を作成</h3>
                <input type="text" id="host-name" placeholder="あなたの名前">
                <button id="create-room-btn">部屋を作成</button>
                <!-- <p>部屋ID: <span id="room-id-display"></span></p>  This span is now within #game-info -->
            </div>
            <hr>
            <div>
                <h3>部屋に参加</h3>
                <input type="text" id="client-name" placeholder="あなたの名前">
                <input type="text" id="room-id-input" placeholder="部屋ID">
                <button id="join-room-btn">部屋に入る</button>
            </div>
        </div> <!-- /#room-management -->

        <!-- Game Information Section: Displays current player, messages, start button, and Room ID -->
        <div id="game-info" class="hidden"> <!-- Initially hidden -->
            <h2>ゲーム情報</h2>
            <p>部屋ID: <span id="room-id-display">-</span></p> <!-- Moved here and default text added -->
            <p>現在のプレイヤー: <span id="current-player-display">-</span></p>
            <p id="message-display" class="info">ここにメッセージが表示されます。</p>
            <button id="start-game-btn" class="hidden">ゲームを開始</button>
        </div> <!-- /#game-info -->
        
        <!-- Player List and Scores Section -->
        <div id="player-list-area" class="hidden"> <!-- Initially hidden -->
            <h3>参加者とスコア:</h3>
            <ul id="player-list">
                <!-- Player items are dynamically added by script.js -->
            </ul>
        </div> <!-- /#player-list-area -->

        <!-- Game Play Area: Contains the board and interactive elements for playing -->
        <div id="game-play-area" class="hidden"> <!-- Initially hidden -->
            
            <!-- Game Board Section: Dynamically generated by script.js -->
            <div id="game-board">
                <!-- Tracks and cells are drawn here -->
            </div> <!-- /#game-board -->

            <!-- Dice Section: Displays dice results and roll button -->
            <div id="dice-area"> 
                <h3>ダイス</h3>
                <div id="dice-result-display">
                    <!-- Dice values appear here, e.g., <span class="dice-value">3</span> -->
                </div>
                <button id="roll-dice-btn">ダイスを振る</button>
            </div> <!-- /#dice-area -->

            <!-- Action Section: Dice combination choices and Stop button -->
            <div id="action-area"> 
                <h3>アクション</h3>
                <div id="dice-combination-choice-area" class="hidden">
                     <!-- Radio buttons for dice combinations generated here -->
                </div>
                <!-- Container for 3rd marker placement choice -->
                <div id="place-third-marker-choice-area" class="hidden">
                    <!-- Title and buttons will be dynamically added here by script.js -->
                </div>
                <button id="stop-btn">ストップ</button>
            </div> <!-- /#action-area -->

        </div> <!-- /#game-play-area -->

    </div> <!-- /.container -->

    <!-- Firebase SDK Scripts -->
    <!-- Firebase App (core) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firestore (database) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Local Firebase Configuration -->
    <script src="firebase-config.js"></script>
    <!-- Main Game Logic Script -->
    <script src="script.js"></script>
</body>
</html>
