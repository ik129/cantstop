<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャントストップ オンライン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>キャントストップ</h1>
    </header>

    <div id="room-management">
        <h2>部屋管理</h2>
        <div>
            <h3>部屋を作成</h3>
            <input type="text" id="host-name" placeholder="あなたの名前">
            <button id="create-room-btn">部屋を作成</button>
            <p>部屋ID: <span id="room-id-display"></span></p>
        </div>
        <hr>
        <div>
            <h3>部屋に参加</h3>
            <input type="text" id="client-name" placeholder="あなたの名前">
            <input type="text" id="room-id-input" placeholder="部屋ID">
            <button id="join-room-btn">部屋に入る</button>
        </div>
    </div>

    <div id="game-info" style="display:none;">
        <h2>ゲーム情報</h2>
        <p>現在のプレイヤー: <span id="current-player-display"></span></p>
        <p id="message-display"></p>
        <button id="start-game-btn" style="display:none;">ゲームを開始</button>
    </div>

    <div id="game-board" style="display:none;">
        <!-- JavaScriptによって動的にゲームボードが描画される場所 -->
    </div>

    <div id="dice-area" style="display:none;">
        <h3>ダイス</h3>
        <p>ダイス: <span id="dice-result-display"></span></p>
        <button id="roll-dice-btn">ダイスを振る</button>
    </div>

    <div id="action-area" style="display:none;">
        <h3>アクション</h3>
        <!-- ペア選択の指示やUI要素を配置するエリア -->
        <div id="dice-combination-choice-area">
             <!-- ダイスの組み合わせ選択肢がここに表示される (script.jsで制御) -->
        </div>
        <button id="stop-btn">ストップ</button>
        <!-- 「続ける」は roll-dice-btn の再活性化や、別のUIで表現する可能性あり -->
    </div>

    <div id="player-list-area" style="display:none;">
        <h3>参加者:</h3>
        <ul id="player-list">
            <!-- JavaScriptでプレイヤー名がリストアイテムとして追加される -->
        </ul>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase Config and App Script -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
